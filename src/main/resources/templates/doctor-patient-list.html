<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Treated Patients</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .title-bar {
            background: linear-gradient(135deg, #0d6efd, #5ab3ff);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        .table-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        table thead {
            background: #e9f2ff;
        }
        .badge-treated {
            background: #28a745;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title-bar">
        <h2 class="fw-bold">Treated Patients List</h2>
    </div>

    <div class="table-container">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>#</th>
                <th>Patient Name</th>
                <th>Reason</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p, i : ${patients}">
                <td th:text="${i.index + 1}"></td>
                <td th:text="${p.fullName}"></td>
                <td th:text="${p.reason}"></td>
                <td th:text="${p.appointmentDate}"></td>
                <td>
                    <span class="badge badge-treated">
                        Treated
                    </span>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- When list is empty -->
        <div class="alert alert-info text-center mt-3" th:if="${#lists.isEmpty(patients)}">
            No treated patients found.
        </div>

        <div class="text-center">
            <a th:href="@{/doctor}" class="btn btn-outline-success home-btn">
                ⬅ Back to Home
            </a>
        </div>
    </div>

</div>

</body>
</html>

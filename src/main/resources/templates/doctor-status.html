<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Doctor Status</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: #eef2f7;
    }

    .card-container {
        max-width: 520px;
        margin: 70px auto;
    }

    .status-card {
        background: #ffffff;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border-top: 6px solid #007bff;
    }

    h3 {
        font-weight: 700;
        color: #007bff;
    }

    label {
        font-weight: 500;
    }

    .btn-primary {
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
    }

    .form-control, .form-select {
        padding: 10px;
        font-size: 15px;
        border-radius: 8px;
    }

    .icon-box {
        width: 60px;
        height: 60px;
        background: #e3f2fd;
        color: #007bff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px auto;
        font-size: 30px;
    }
  </style>
</head>

<body>

<div class="card-container">

  <div class="status-card">

    <!-- Beautiful Icon -->
    <div class="icon-box">
      🩺
    </div>

    <h3 class="text-center mb-4">Update Doctor Status</h3>

    <form th:action="@{/doctor/updateStatus}" method="post" th:object="${doctor}">

      <input type="hidden" th:field="*{id}">

      <div class="mb-3">
        <label class="form-label">Doctor Name</label>
        <input type="text" th:field="*{username}" class="form-control" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">Status</label>
        <select th:field="*{status}" class="form-select">
          <option value="Available">Available</option>
          <option value="Not Available">Not Available</option>
        </select>
      </div>

      <button class="btn btn-primary w-100">Update Status</button>
    </form>

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prescription Submitted</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .success-card {
            width: 600px;
            background: #ffffff;
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .success-icon {
            font-size: 70px;
            color: #28a745;
        }

        .title {
            font-weight: 700;
            color: #1976d2;
            margin-top: 10px;
        }

        .details-box {
            background: #f1f8ff;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: left;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="success-card">

    <!-- Success Icon -->
    <div class="success-icon">✔</div>

    <h2 class="title">Prescription Submitted Successfully!</h2>
    <p class="text-muted mt-2">The patient has been treated and the prescription is saved.</p>

    <!-- Prescription Summary -->
    <div class="details-box mt-4">

        <h5 class="fw-bold text-primary mb-3">Prescription Summary</h5>

        <p><strong>Doctor:</strong> <span th:text="${prescription.doctor.username}"></span></p>
        <p><strong>Patient:</strong> <span th:text="${prescription.patient.username}"></span></p>

        <p>
            <strong>Medicines:</strong><br>
            <span th:text="${prescription.medicines}"></span>
        </p>

        <p>
            <strong>Advice:</strong><br>
            <span th:text="${prescription.advice}"></span>
        </p>

        <p>
            <strong>Follow-up Date:</strong>
            <span th:text="${prescription.followUpDate}"></span>
        </p>
    </div>

    <!-- Buttons -->
    <div class="mt-4">
        <a th:href="@{/doctor}" class="btn btn-primary btn-main mb-2">Go to Dashboard</a>
        <a th:href="@{/doctor/allPrescriptions}" class="btn btn-outline-primary btn-main">View All Prescriptions</a>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Doctors List</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6f9; }
    .container { margin-top: 50px; }
  </style>
</head>
<body>

<div class="container">
  <h3 class="mb-4">All Registered Doctors</h3>

  <table class="table table-bordered table-striped shadow-sm">
    <thead class="table-primary">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Specialization</th>
      <th>Email</th>
      <th>Actions</th>   <!-- NEW COLUMN -->
    </tr>
    </thead>

    <tbody>
    <tr th:each="d : ${doctors}">
      <td th:text="${d.id}"></td>
      <td th:text="${d.username}"></td>
      <td th:text="${d.specialization}"></td>
      <td th:text="${d.email}"></td>

      <!-- ACTION BUTTONS -->
      <td>
        <a th:href="@{'/admin/doctor/edit/' + ${d.id}}"
           class="btn btn-sm btn-warning me-2">
          Edit
        </a>

        <a th:href="@{'/admin/doctor/delete/' + ${d.id}}"
           class="btn btn-sm btn-danger"
           onclick="return confirm('Are you sure you want to delete this doctor?');">
          Delete
        </a>
      </td>
    </tr>

    <tr th:if="${doctors.size() == 0}">
      <td colspan="5" class="text-center text-muted py-3">No doctors found</td>
    </tr>
    </tbody>
  </table>

  <a th:href="@{/admin}" class="btn btn-secondary">Back to Dashboard</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6f9; }

    .profile-card {
        max-width: 700px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

    .edit-btn {
        float: right;
        margin-top: -10px;
    }

    input[readonly], select[disabled], textarea[readonly] {
        background: #f0f4f8 !important;
        cursor: not-allowed;
    }
  </style>

  <script>
    function enableEditing() {
        document.querySelectorAll(".editable").forEach(el => {
            el.removeAttribute("readonly");
            el.removeAttribute("disabled");
        });
        document.getElementById("saveBtn").style.display = "block";
    }
  </script>

</head>

<body>

<div class="profile-card">

  <h3 class="mb-3">User Profile</h3>

  <!-- EDIT BUTTON -->
  <button class="btn btn-primary edit-btn" onclick="enableEditing()">Edit</button>

  <!-- SUCCESS MESSAGE -->
  <div th:if="${param.updated}" class="alert alert-success">Profile Updated Successfully!</div>

  <form th:action="@{/user/update}" method="post" th:object="${user}">

    <input type="hidden" th:field="*{id}">

    <!-- FULL NAME -->
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" th:field="*{username}" class="form-control editable" readonly>
    </div>

    <!-- EMAIL -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" th:field="*{email}" class="form-control editable" readonly>
    </div>

    <!-- ROLE (Admin / Doctor / Patient) -->
    <div class="mb-3">
      <label class="form-label">Role</label>
      <input type="text" th:value="${user.role}" class="form-control" readonly>
    </div>

    <!-- DOCTOR SPECIALIZATION -->
    <div class="mb-3" th:if="${user.specialization}">
      <label class="form-label">Specialization</label>
      <input type="text" th:field="*{specialization}" class="form-control editable" readonly>
    </div>

    <!-- DOCTOR STATUS -->
    <div class="mb-3" th:if="${user.status}">
      <label class="form-label">Status</label>
      <select th:field="*{status}" class="form-select editable" disabled>
        <option value="Available">Available</option>
        <option value="Not Available">Not Available</option>
      </select>
    </div>

    <!-- PATIENT EXTRA DETAILS (Show if exists) -->
    <div th:if="${user.age}">
      <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" th:field="*{age}" class="form-control editable" readonly>
      </div>
    </div>

    <!-- SAVE BUTTON -->
    <button type="submit" id="saveBtn" class="btn btn-success w-100 mt-3" style="display:none;">
      Save Changes
    </button>

  </form>

</div>

</body>
</html>

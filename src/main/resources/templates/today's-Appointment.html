<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Today's Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .container { margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h3 class="mb-4">Today's Appointment</h3>

    <table class="table table-bordered table-striped shadow-sm">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Doctor name</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="l : ${list}">
            <td th:text="${l.id}"></td>
            <td th:text="${l.patient.username}"></td>
            <td th:text="${l.doctor.username}"></td>
            <td th:text="${l.appointmentDate}"></td>

            <td>
                <a th:href="@{/video-call(room=${l.roomId})}">
                    Start Consultation
                </a>
            </td>
        </tr>

        <tr th:if="${list == null or list.isEmpty()}">
            <td colspan="5" class="text-center text-muted py-3">No Appointment</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/patient}" class="btn btn-secondary">Back to Dashboard</a>
</div>

</body>
</html>

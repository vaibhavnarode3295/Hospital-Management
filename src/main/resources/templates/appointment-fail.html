<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Appointment Failed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            height: 100vh;
        }
        .fail-box {
            max-width: 550px;
            margin: auto;
            margin-top: 120px;
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .fail-icon {
            font-size: 60px;
            color: #c62828;
        }
    </style>
</head>

<body>

<div class="fail-box">

    <div class="fail-icon">✖</div>

    <h2 class="mt-3 text-danger">Appointment Failed</h2>

    <p class="text-muted mt-2">
        We were unable to book your appointment.
        Please try again later or choose another time/doctor.
    </p>

    <a th:href="@{/patient/appointment}" class="btn btn-danger w-100 mt-3">Try Again</a>
    <a th:href="@{/patient}" class="btn btn-outline-danger w-100 mt-2">Back to Dashboard</a>

</div>

</body>
</html>

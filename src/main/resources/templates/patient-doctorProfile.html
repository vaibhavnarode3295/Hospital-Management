<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Doctor Profile</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
        background: #f4f7fb;
    }
    .profile-card {
        max-width: 700px;
        margin: 40px auto;
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }
    .profile-header {
        background: linear-gradient(135deg,#28a745,#66bb6a);
        color: white;
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        margin-bottom: 25px;
    }
    .profile-label {
        font-weight: 600;
        color: #555;
    }
    .status-badge {
        font-size: 14px;
        padding: 6px 12px;
        border-radius: 20px;
    }
    .status-available {
        background:#d4edda;
        color:#155724;
    }
    .status-notavailable {
        background:#f8d7da;
        color:#721c24;
    }
    .btn-back {
        border-radius: 8px;
    }
  </style>
</head>

<body>



<div class="profile-card">

  <!-- Profile Header -->
  <div class="profile-header">
    <h2>Dr. <span th:text="${doctor.username}"></span></h2>
    <p class="mb-0">Specialization: <span th:text="${doctor.specialization}"></span></p>
  </div>

  <!-- Profile Content -->
  <div class="mb-3">
    <span class="profile-label">Full Name: </span>
    <span th:text="${doctor.username}"></span>
  </div>

  <div class="mb-3">
    <span class="profile-label">Email: </span>
    <span th:text="${doctor.email}"></span>
  </div>

  <div class="mb-3">
    <span class="profile-label">Specialization: </span>
    <span th:text="${doctor.specialization}"></span>
  </div>

  <div class="mb-3">
    <span class="profile-label">Status: </span>

    <span th:if="${doctor.status == 'Available'}"
          class="status-badge status-available">
            Available
        </span>

    <span th:if="${doctor.status == 'Not Available'}"
          class="status-badge status-notavailable">
            Not Available
        </span>
  </div>


  <!-- Back Button -->
  <div class="text-center mt-4">
    <a th:href="@{/patient}" class="btn btn-success btn-back px-4">
      ⬅ Back to Dashboard
    </a>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Appointments - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f9ff;
            font-family: 'Poppins', sans-serif;
        }

        .page-title {
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 20px;
        }

        .card {
            border-radius: 15px;
        }

        .badge-scheduled {
            background: #ffc107;
            color: #000;
            padding: 6px 10px;
            border-radius: 10px;
        }

        .badge-treated {
            background: #28a745;
            padding: 6px 10px;
            border-radius: 10px;
        }

        .search-box input {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-3 shadow-sm">
    <span class="navbar-brand fw-bold">Admin Panel</span>
</nav>

<div class="container mt-4">

    <h2 class="page-title">All Appointments</h2>

    <div class="card p-3 shadow-sm">

        <!-- Search -->
        <div class="row mb-3">
            <div class="col-md-4 search-box">
                <input type="text" id="searchInput" class="form-control"
                       placeholder="Search by doctor, patient, status...">
            </div>
        </div>

        <!-- Appointments Table -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">

                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Problem</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody id="appointmentTable">

                <tr th:each="app, i : ${appointments}">
                    <td th:text="${i.index + 1}"></td>

                    <td th:text="${app.patient.username}"></td>

                    <td th:text="${app.doctor.username}"></td>

                    <td th:text="${app.appointmentDate}"></td>

                    <td th:text="${app.reason}"></td>

                    <td>
                        <span th:if="${app.status == 'Schedule'}" class="badge-scheduled">
                            Scheduled
                        </span>

                        <span th:if="${app.status == 'Treted'}" class="badge-treated">
                            Treated
                        </span>
                    </td>
                </tr>

                </tbody>

            </table>
        </div>

        <div class="mt-4">
            <a th:href="@{/admin}" class="btn btn-primary">Go to Dashboard</a>
        </div>
    </div>
</div>

<script>
    // Simple search filter
    document.getElementById("searchInput").addEventListener("keyup", function () {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#appointmentTable tr");

        rows.forEach(row => {
            let text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    });
</script>

</body>
</html>

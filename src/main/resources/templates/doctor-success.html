<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Added Successfully</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #D0EAEF; }
        .box {
            max-width: 450px;
            margin: 100px auto;
            background: #F0F0F0;
            padding: 35px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        .checkmark {
            font-size: 60px;
            color: #28a745;
        }
    </style>
</head>

<body>

<div class="box">
    <div class="checkmark">✔</div>
    <h3 class="mt-3">Doctor Added Successfully!</h3>
    <p class="text-muted">The doctor has been added to the system.</p>

    <a th:href="@{/admin/doctors}" class="btn btn-success mt-3 w-100">
        Add Another Doctor
    </a>

    <a th:href="@{/admin}" class="btn btn-primary mt-2 w-100">
        Go to Dashboard
    </a>
</div>

</body>
</html>

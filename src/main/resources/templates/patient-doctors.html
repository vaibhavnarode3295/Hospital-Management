<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Doctors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
        }
        .doctor-card {
            border-radius: 15px;
            padding: 20px;
            background: white;
            transition: 0.3s;
            box-shadow: 0px 5px 18px rgba(0,0,0,0.06);
        }
        .doctor-card:hover {
            transform: scale(1.03);
            box-shadow: 0px 8px 24px rgba(0,0,0,0.12);
        }
        .status-badge {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .status-available {
            background: #d4edda;
            color: #117a37;
        }
        .status-not {
            background: #f8d7da;
            color: #a1262d;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-3 shadow-sm mb-4">
    <span class="navbar-brand fw-bold">All Doctors</span>
    <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
</nav>

<div class="container">
    <h3 class="mb-4 fw-bold">Doctor Directory</h3>

    <div class="row g-4">

        <!-- Doctor Card Loop -->
        <div class="col-md-4" th:each="d : ${doctors}">
            <div class="doctor-card">

                <h5 class="fw-bold mb-1" th:text="${d.username}">Doctor Name</h5>

                <p class="text-muted mb-2">
                    Specialization: <span th:text="${d.specialization}"></span>
                </p>

                <!-- Status -->
                <span th:classappend="${d.status == 'Available'}
                        ? 'status-badge status-available'
                        : 'status-badge status-not'">
                    <span th:text="${d.status}"></span>
                </span>

                <!-- Profile Button -->
                <div class="mt-3">
                    <a class="btn btn-outline-primary w-100"
                       th:href="@{'/patient-doctor/profile/' + ${d.id}}">
                        View Profile
                    </a>
                </div>

            </div>
        </div>
        <!-- End Loop -->

        <div th:if="${#lists.isEmpty(doctors)}" class="text-center text-muted py-5">
            <h5>No doctors found</h5>
        </div>

    </div>
</div>

</body>
</html>

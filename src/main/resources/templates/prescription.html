<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Prescriptions</title>
  <meta charset="UTF-8">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
        background: #eef2f7;
    }
    .header-banner {
        background: linear-gradient(135deg, #4e73df, #1cc7d0);
        color: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .prescription-card {
        border-radius: 12px;
        padding: 25px;
        background: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: 0.2s;
    }
    .prescription-card:hover {
        transform: scale(1.02);
    }
    .pill {
        background: #4e73df;
        color: white;
        padding: 2px 8px;
        border-radius: 5px;
        font-size: 12px;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary px-3">
  <a class="navbar-brand fw-bold">Patient Panel</a>
  <div>
    <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- Header Banner -->
  <div class="header-banner mb-4">
    <h2 class="fw-bold">💊 My Prescriptions</h2>
    <p>Below are all prescriptions issued by your doctors.</p>
  </div>

  <!-- Prescription List Row-->
  <div class="row g-4" th:if="${!#lists.isEmpty(prescriptions)}">

    <div class="col-md-6" th:each="p : ${prescriptions}">
      <div class="prescription-card">

        <div class="d-flex justify-content-between mb-2">
          <h5 class="fw-bold text-primary">Prescription</h5>
          <span class="pill" th:text="${p.dateIssued}">Date</span>
        </div>

        <p><strong>Doctor:</strong>
          <span th:text="${p.doctor.username}"></span>
        </p>

        <p>
          <strong>Tests:</strong><br>
          <span th:text="${p.tests}"></span>
        </p>

        <p>
          <strong>Medicines:</strong><br>
          <span th:text="${p.medicines}"></span>
        </p>

        <p>
          <strong>Advice:</strong><br>
          <span th:text="${p.advice}"></span>
        </p>

        <div th:if="${p.appointment != null}">
          <p><strong>Appointment Reference:</strong>
            <span class="text-info">
              #<span th:text="${p.appointment.id}"></span>
            </span>
          </p>
        </div>

        <hr>

        <div class="d-flex justify-content-between">
          <a th:href="@{'/user/prescriptions/view/' + ${p.id}}"
             class="btn btn-sm btn-outline-primary">
            View Details
          </a>
          <a th:href="@{'/user/prescriptions/download/' + ${p.id}}"
             class="btn btn-sm btn-success">
            Download PDF
          </a>
        </div>

      </div>
    </div>

  </div>

  <!-- Empty Message (Shown when list is empty) -->
  <div th:if="${#lists.isEmpty(prescriptions)}" class="text-center text-muted mt-5">
    <h5>No Prescriptions Found</h5>
    <p>You will see prescriptions here after doctor consultation.</p>
  </div>

</div>

</body>
</html>

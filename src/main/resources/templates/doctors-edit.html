<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .form-container {
            max-width: 600px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="form-container">
    <h3 class="mb-4 text-primary">Edit Doctor Details</h3>

    <!-- FORM SUBMIT -->
    <form th:action="@{/admin/doctor/update}" method="post" th:object="${doctor}">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}" th:value="${doctor.id}">

        <!-- Name -->
        <div class="mb-3">
            <label class="form-label">Doctor Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{username}"
                   th:value="${doctor.username}"
                   required>
        </div>

        <!-- Specialization -->
        <div class="mb-3">
            <label class="form-label">Specialization</label>
            <input type="text"
                   class="form-control"
                   th:field="*{specialization}"
                   th:value="${doctor.specialization}"
                   required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   class="form-control"
                   th:field="*{email}"
                   th:value="${doctor.email}"
                   required>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a th:href="@{/admin}" class="btn btn-secondary">Back</a>
            <button type="submit" class="btn btn-success">Update</button>
        </div>

    </form>
</div>

</body>
</html>

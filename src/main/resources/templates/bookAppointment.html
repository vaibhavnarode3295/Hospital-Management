<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Book Appointment</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        min-height: 100vh;
    }
    .form-container {
        max-width: 750px;
        background: #ffffff;
        padding: 35px;
        border-radius: 18px;
        margin: 50px auto;
        box-shadow: 0px 8px 25px rgba(0,0,0,0.1);
    }
    .header-title {
        background: linear-gradient(135deg, #1976d2, #42a5f5);
        color: white;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 25px;
        text-align: center;
    }
    .btn-primary {
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-3 shadow-sm">
  <a class="navbar-brand fw-bold">Patient Panel</a>
  <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
</nav>

<div class="container">

  <div class="form-container">

    <div class="header-title">
      <h3>Book Your Appointment</h3>
    </div>

    <!-- Success Message -->
    <div th:if="${param.success}" class="alert alert-success">
      Appointment booked successfully!
    </div>

    <!-- Error Message -->
    <div th:if="${param.error}" class="alert alert-danger">
      Something went wrong. Please try again.
    </div>

    <form th:action="@{/patient/appointment}" method="post" th:object="${appointment}">

      <!-- Patient Name -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter full name" required>
        </div>

        <!-- Age -->
        <div class="col-md-3">
          <label class="form-label">Age</label>
          <input type="number" th:field="*{age}" class="form-control" placeholder="Age" required>
        </div>

        <!-- Gender -->
        <div class="col-md-3">
          <label class="form-label">Gender</label>
          <select th:field="*{gender}" class="form-select" required>
            <option value="" disabled selected>Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

      </div>


      <!-- Specialization -->
      <div class="mb-3">
        <label class="form-label">Choose Specialization</label>
        <select th:field="*{specification}" class="form-select">
          <option value="" selected disabled>Choose Specialization</option>
          <option value="General">General</option>
          <option value="Cardiologist">Cardiologist</option>
        </select>
      </div>

      <!-- Date & Time -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Appointment Date</label>
          <input type="date" th:field="*{appointmentDate}" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Preferred Time</label>
          <input type="time" th:field="*{appointmentTime}" class="form-control" required>
        </div>
      </div>

      <!-- Problem Description -->
      <div class="mb-3">
        <label class="form-label">Describe Your Problem</label>
        <textarea th:field="*{reason}" class="form-control" rows="3"
                  placeholder="Example: Fever, cough, headache"></textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100">Confirm Appointment</button>

    </form>

    <div class="text-center mt-3">
      <a class="text-muted" th:href="@{/patient}">⬅ Back to Dashboard</a>
    </div>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | Hospital Management System</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: #f4f6f9;
    }
    .login-card {
        max-width: 400px;
        margin: 80px auto;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .btn-primary {
        width: 100%;
    }
  </style>
</head>
<body>

<div class="login-card">
  <h3 class="text-center mb-4">Hospital Login</h3>

  <!-- Invalid Credentials -->
  <div th:if="${param.error}" class="alert alert-danger">
    Invalid username or password. Try again!
  </div>

  <!-- Logout Success -->
  <div th:if="${param.logout}" class="alert alert-success">
    You have been logged out successfully.
  </div>

  <form th:action="@{/login}" method="post" >
    <div class="mb-3">
      <label>Email</label>
      <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <div class="d-flex justify-content-center align-items-center">
      <a th:href="@{/register}"> <span>Don't Have Account?</span> </a>
    </div>


    <button type="submit" class="btn btn-primary">Login</button>
  </form>

  <a th:href="@{/oauth2/authorization/google}" class="btn btn-google d-flex align-items-center justify-content-center">
    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo" style="height:16px; margin-right:8px;">
    <span>Sign in with Google</span>
  </a>
</div>

</body>
</html>

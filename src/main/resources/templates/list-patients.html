<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Patients List</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .container { margin-top: 50px; }
  </style>
</head>
<body>

<div class="container">
  <h3 class="mb-4">All Registered Patients</h3>

  <table class="table table-bordered table-striped shadow-sm">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Email</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${patients}">
      <td th:text="${p.id}"></td>
      <td th:text="${p.username}"></td>
      <td th:text="${p.email}"></td>
    </tr>

    <tr th:if="${patients.size() == 0}">
      <td colspan="3" class="text-center text-muted">No patients found</td>
    </tr>
    </tbody>
  </table>

  <a th:href="@{/admin}" class="btn btn-secondary">Back to Dashboard</a>
</div>

</body>
</html>

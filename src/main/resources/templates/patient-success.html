<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Added Successfully</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6f9; }
    .box {
        max-width: 450px;
        margin: 100px auto;
        background: white;
        padding: 35px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    .checkmark {
        font-size: 60px;
        color: #007bff;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="checkmark">✔</div>
  <h3 class="mt-3">User Added Successfully!</h3>
  <p class="text-muted">The user has been added to the system.</p>

  <a th:href="@{/admin/patients}" class="btn btn-primary mt-3 w-100">
    Add Another User
  </a>

  <a th:href="@{/admin}" class="btn btn-secondary mt-2 w-100">
    Go to Dashboard
  </a>
</div>

</body>
</html>
